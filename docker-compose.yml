# docker-compose.yml
# Sueteres RAG — Orquestração completa de serviços
#
# Serviços:
#   ollama   — LLM local (Mistral 7B)
#   api      — FastAPI RAG pipeline
#
# Uso:
#   docker compose up -d
#   docker compose exec api python scripts/ingest_corpus.py --stats

services:

  # ── Ollama — servidor de LLM local ────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sueteres-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    # Para usar GPU NVIDIA: descomente as linhas abaixo
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Inicialização de modelos (run-once) ───────────────────
  ollama-init:
    image: curlimages/curl:latest
    container_name: sueteres-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Pulling Mistral 7B (primary model)...' &&
      curl -s http://ollama:11434/api/pull -d '{\"name\": \"mistral:7b-instruct-v0.3-q4_K_M\"}' &&
      echo 'Pulling Qwen 2.5 3B (fallback model)...' &&
      curl -s http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:3b-instruct-q4_K_M\"}' &&
      echo 'Models ready.'
      "
    restart: "no"

  # ── FastAPI — pipeline RAG ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sueteres-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./corpus:/app/corpus:ro
      - ./chroma_db:/app/chroma_db
      - ./document_store:/app/document_store
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PRIMARY_MODEL=mistral:7b-instruct-v0.3-q4_K_M
      - LLM_FALLBACK_MODEL=qwen2.5:3b-instruct-q4_K_M
      - EMBEDDING_MODEL=intfloat/multilingual-e5-large
      - EMBEDDING_DEVICE=cpu
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - SQLITE_DB_PATH=/app/document_store/sueteres.db
      - CORPUS_DIR=/app/corpus
      - MODELS_CACHE_DIR=/app/models
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      # Substitua pela sua chave em produção:
      - API_KEY=${API_KEY:-sueteres-dev-key}
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


volumes:
  ollama_models:
    driver: local

networks:
  default:
    name: sueteres-network
